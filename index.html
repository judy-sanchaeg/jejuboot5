<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 꽃 정원 산책</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Malgun Gothic', 'Apple Gothic', 'Noto Sans KR', sans-serif; }
  canvas { display: block; }

  #start-screen {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, #1a0533 0%, #0c1445 50%, #061020 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: white; cursor: pointer; z-index: 100;
    transition: opacity 0.8s ease;
  }
  #start-screen.hidden { opacity: 0; pointer-events: none; }

  #start-screen h1 {
    font-size: 56px; margin-bottom: 12px; letter-spacing: 4px;
    background: linear-gradient(120deg, #ff9de2, #ffd1a3, #ffee88, #b8f4b8, #a0d8ef);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 30px rgba(255,160,210,0.5));
  }
  #start-screen .sub {
    font-size: 17px; opacity: 0.65; letter-spacing: 2px; margin-bottom: 44px;
  }
  #start-screen .btn {
    padding: 15px 48px; border: 2px solid rgba(255,200,230,0.5);
    border-radius: 40px; font-size: 16px; color: white; letter-spacing: 3px;
    background: rgba(255,150,180,0.12); backdrop-filter: blur(8px);
    transition: all 0.3s; cursor: pointer; font-family: inherit;
  }
  #start-screen:hover .btn {
    background: rgba(255,100,150,0.25);
    border-color: rgba(255,180,210,0.9);
    box-shadow: 0 0 40px rgba(255,100,150,0.3);
    transform: scale(1.04);
  }
  #start-screen .keys {
    margin-top: 28px; font-size: 12px; opacity: 0.4; letter-spacing: 1.5px;
  }

  /* In-game UI */
  #ui { position: fixed; inset: 0; pointer-events: none; display: none; }

  #crosshair {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 18px; height: 18px;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: rgba(255,255,255,0.75); border-radius: 1px;
  }
  #crosshair::before { width: 2px; height: 18px; left: 8px; }
  #crosshair::after  { width: 18px; height: 2px; top: 8px; }

  #flower-label {
    position: absolute; top: 44%; left: 50%;
    transform: translateX(-50%);
    text-align: center;
    opacity: 0; transition: opacity 0.3s;
  }
  #flower-label.show { opacity: 1; }
  #flower-label .fname {
    font-size: 22px; font-weight: bold; color: #fff;
    text-shadow: 0 2px 10px rgba(0,0,0,0.9), 0 0 24px rgba(255,160,200,0.6);
  }
  #flower-label .fdesc {
    font-size: 13px; color: rgba(255,255,255,0.75); margin-top: 5px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.8);
  }

  #hud {
    position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.55); font-size: 12px; letter-spacing: 1px;
    background: rgba(0,0,0,0.28); padding: 8px 22px;
    border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(6px); white-space: nowrap;
  }
  #zone-name {
    position: absolute; top: 22px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.7); font-size: 14px; letter-spacing: 2px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.6);
    background: rgba(0,0,0,0.2); padding: 6px 18px;
    border-radius: 14px; backdrop-filter: blur(4px);
    transition: opacity 0.5s;
  }
  #zone-name.fade { opacity: 0; }
</style>
</head>
<body>

<div id="start-screen">
  <h1>🌸 꽃 정원 산책 🌸</h1>
  <p class="sub">아름다운 꽃들이 피어있는 정원을 거닐어 보세요</p>
  <button class="btn">✦ 정원 입장하기 ✦</button>
  <p class="keys">WASD · 방향키 이동 &nbsp;|&nbsp; 마우스 시점 &nbsp;|&nbsp; Shift 달리기 &nbsp;|&nbsp; ESC 나가기</p>
</div>

<div id="ui">
  <div id="crosshair"></div>
  <div id="flower-label">
    <div class="fname"></div>
    <div class="fdesc"></div>
  </div>
  <div id="hud">WASD · 이동 &nbsp;|&nbsp; 마우스 · 시점 &nbsp;|&nbsp; Shift · 달리기 &nbsp;|&nbsp; ESC · 나가기</div>
  <div id="zone-name">🌸 봄의 정원</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
// SETUP
// ═══════════════════════════════════════════════════════════
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0xc8dff2, 0.011);

const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 1.7, 3);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ─── SKY ──────────────────────────────────────────────────
const sky = new THREE.Mesh(
  new THREE.SphereGeometry(180, 32, 16),
  new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: {
      uTop: { value: new THREE.Color(0x2468c8) },
      uMid: { value: new THREE.Color(0x74b8e8) },
      uBot: { value: new THREE.Color(0xf8d8c0) },
    },
    vertexShader: `
      varying vec3 vP;
      void main(){ vP=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }
    `,
    fragmentShader: `
      uniform vec3 uTop,uMid,uBot;
      varying vec3 vP;
      void main(){
        float t=normalize(vP).y;
        vec3 c=t>0.0?mix(uMid,uTop,pow(t,0.55)):mix(uBot,uMid,pow(clamp(t+1.,0.,1.),0.5));
        gl_FragColor=vec4(c,1.);
      }
    `
  })
);
scene.add(sky);

// ─── LIGHTS ───────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xfff5e8, 0.7));

const sun = new THREE.DirectionalLight(0xfff5c8, 1.4);
sun.position.set(60, 90, 40);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -60; sun.shadow.camera.right = 60;
sun.shadow.camera.top  =  60; sun.shadow.camera.bottom = -60;
sun.shadow.camera.far  = 200;
scene.add(sun);

const fill = new THREE.DirectionalLight(0xb8d8f8, 0.3);
fill.position.set(-40, 30, -30);
scene.add(fill);

// ─── GROUND ───────────────────────────────────────────────
(function makeGround() {
  const c = document.createElement('canvas');
  c.width = c.height = 512;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#3b7226';
  ctx.fillRect(0, 0, 512, 512);
  for (let i = 0; i < 8000; i++) {
    const x = Math.random() * 512, y = Math.random() * 512;
    const v = (Math.random() - 0.5) * 35;
    ctx.fillStyle = `rgb(${50+v*0.3|0},${105+v|0},${30+v*0.2|0})`;
    ctx.fillRect(x, y, 2 + Math.random()*2, 2 + Math.random()*2);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(25, 25);

  const mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(220, 220),
    new THREE.MeshLambertMaterial({ map: tex })
  );
  mesh.rotation.x = -Math.PI / 2;
  mesh.receiveShadow = true;
  scene.add(mesh);
})();

// Paths
function addPath(w, h, rx, pos) {
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(w, h),
    new THREE.MeshLambertMaterial({ color: 0xc8a87a })
  );
  m.rotation.x = -Math.PI / 2;
  if (rx) m.rotation.z = Math.PI / 2;
  m.position.set(pos[0], 0.01, pos[1]);
  scene.add(m);
}
addPath(3, 90, false, [0, 0]);
addPath(3, 90, true,  [0, 0]);

// ═══════════════════════════════════════════════════════════
// FLOWER UTILITY
// ═══════════════════════════════════════════════════════════
const STEM_MAT  = new THREE.MeshLambertMaterial({ color: 0x2e6e1c });
const LEAF_MAT  = new THREE.MeshLambertMaterial({ color: 0x2f8b1a, side: THREE.DoubleSide });

function stem(h = 0.85, r = 0.03) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(r*0.6, r, h, 7), STEM_MAT);
  m.position.y = h / 2;
  m.castShadow = true;
  return m;
}

function leaf(sx = 1, side = 1) {
  const sh = new THREE.Shape();
  sh.moveTo(0, 0);
  sh.bezierCurveTo(0.12*sx, 0.06*sx, 0.18*sx, 0.22*sx, 0, 0.35*sx);
  sh.bezierCurveTo(-0.18*sx, 0.22*sx, -0.12*sx, 0.06*sx, 0, 0);
  return new THREE.Mesh(new THREE.ShapeGeometry(sh, 6), LEAF_MAT);
}

function petalShape(w, h) {
  const sh = new THREE.Shape();
  sh.moveTo(0, 0);
  sh.bezierCurveTo( w*0.8,  h*0.35,  w,   h*0.7, 0, h);
  sh.bezierCurveTo(-w,      h*0.7,  -w*0.8, h*0.35, 0, 0);
  return sh;
}

// ═══════════════════════════════════════════════════════════
// ROSE (장미)
// ═══════════════════════════════════════════════════════════
function makeRose(color) {
  const g = new THREE.Group();
  g.add(stem(0.9, 0.035));

  // leaves
  [[0.1,0.28, 1],[- 0.1,0.48,-1]].forEach(([lx,ly,s])=>{
    const lf = leaf(0.85);
    lf.position.set(lx, ly, 0);
    lf.rotation.y = s * Math.PI/5;
    lf.rotation.z = -s * Math.PI/5;
    g.add(lf);
  });

  const petalMat  = new THREE.MeshLambertMaterial({ color, side: THREE.DoubleSide });
  const innerMat  = new THREE.MeshLambertMaterial({
    color: new THREE.Color(color).multiplyScalar(0.68),
    side: THREE.DoubleSide
  });

  const layers = [
    { n:5,  r:0.015, y:0.91, tilt:0.15, w:0.07, h:0.22, mat: innerMat },
    { n:7,  r:0.06,  y:0.89, tilt:0.45, w:0.09, h:0.26, mat: innerMat },
    { n:9,  r:0.13,  y:0.86, tilt:0.75, w:0.10, h:0.28, mat: petalMat },
    { n:12, r:0.20,  y:0.82, tilt:1.05, w:0.11, h:0.30, mat: petalMat },
  ];

  layers.forEach((lyr, li) => {
    const geo = new THREE.ShapeGeometry(petalShape(lyr.w, lyr.h), 6);
    for (let i = 0; i < lyr.n; i++) {
      const a = (i / lyr.n) * Math.PI * 2 + li * 0.45;
      const p = new THREE.Mesh(geo, lyr.mat);
      p.position.set(Math.cos(a)*lyr.r, lyr.y, Math.sin(a)*lyr.r);
      p.rotation.y = -a + Math.PI/2;
      p.rotation.x = -lyr.tilt;
      g.add(p);
    }
  });

  // centre stamen
  const ctr = new THREE.Mesh(
    new THREE.SphereGeometry(0.032, 8, 8),
    new THREE.MeshLambertMaterial({ color: 0xffe040 })
  );
  ctr.position.y = 0.935;
  g.add(ctr);

  g.userData.name = '장미 (Rose)';
  g.userData.desc = '사랑과 열정의 꽃';
  return g;
}

// ═══════════════════════════════════════════════════════════
// SUNFLOWER (해바라기)
// ═══════════════════════════════════════════════════════════
function makeSunflower() {
  const g = new THREE.Group();
  g.add(stem(1.6, 0.05));

  // big leaves
  [[0.18,0.5,1],[- 0.18,0.85,-1]].forEach(([lx,ly,s])=>{
    const lf = leaf(1.5);
    lf.position.set(lx, ly, 0);
    lf.rotation.y = s * Math.PI/4;
    lf.rotation.z = -s * Math.PI/4;
    g.add(lf);
  });

  const diskY = 1.63;

  // center disk
  const disk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.24, 0.24, 0.07, 24),
    new THREE.MeshLambertMaterial({ color: 0x3b1a00 })
  );
  disk.position.y = diskY;
  g.add(disk);

  // seed bumps
  const seedMat = new THREE.MeshLambertMaterial({ color: 0x5a2e08 });
  for (let ring = 0; ring < 4; ring++) {
    const cnt = (ring + 1) * 6;
    const rad = 0.04 + ring * 0.05;
    const sGeo = new THREE.SphereGeometry(0.016 - ring*0.002, 5, 4);
    for (let i = 0; i < cnt; i++) {
      const a = (i / cnt) * Math.PI * 2;
      const s = new THREE.Mesh(sGeo, seedMat);
      s.position.set(Math.cos(a)*rad, diskY + 0.045, Math.sin(a)*rad);
      g.add(s);
    }
  }

  // yellow petals
  const yMat = new THREE.MeshLambertMaterial({ color: 0xFFD000, side: THREE.DoubleSide });
  const pGeo = new THREE.ShapeGeometry(petalShape(0.065, 0.38), 6);
  for (let i = 0; i < 22; i++) {
    const a = (i / 22) * Math.PI * 2;
    const p = new THREE.Mesh(pGeo, yMat);
    p.position.set(Math.cos(a)*0.26, diskY, Math.sin(a)*0.26);
    p.rotation.y = -a + Math.PI/2;
    p.rotation.x = -Math.PI/10;
    g.add(p);
  }

  g.userData.name = '해바라기 (Sunflower)';
  g.userData.desc = '태양을 향해 피어나는 행복의 꽃';
  return g;
}

// ═══════════════════════════════════════════════════════════
// TULIP (튤립)
// ═══════════════════════════════════════════════════════════
function makeTulip(color) {
  const g = new THREE.Group();
  g.add(stem(1.05, 0.04));

  const lf = leaf(1.2);
  lf.position.set(0.12, 0.35, 0);
  lf.rotation.y = Math.PI/3;
  lf.rotation.z = -Math.PI/5;
  g.add(lf);

  const outer = new THREE.MeshLambertMaterial({ color, side: THREE.DoubleSide });
  const inner = new THREE.MeshLambertMaterial({
    color: new THREE.Color(color).lerp(new THREE.Color(0xffffff), 0.25),
    side: THREE.DoubleSide
  });

  const pSh = new THREE.Shape();
  pSh.moveTo(0, 0);
  pSh.bezierCurveTo( 0.075, 0.14,  0.1,  0.33,  0.045, 0.47);
  pSh.bezierCurveTo( 0.015, 0.52, -0.015, 0.52, -0.045, 0.47);
  pSh.bezierCurveTo(-0.1,   0.33, -0.075, 0.14,  0, 0);
  const pGeo = new THREE.ShapeGeometry(pSh, 8);

  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2;
    const p = new THREE.Mesh(pGeo, i < 3 ? outer : inner);
    p.position.set(Math.cos(a)*0.065, 1.05, Math.sin(a)*0.065);
    p.rotation.y = -a + Math.PI/2;
    p.rotation.x = -0.55 + (i < 3 ? 0 : 0.08);
    g.add(p);
  }

  g.userData.name = '튤립 (Tulip)';
  g.userData.desc = '봄의 전령, 완벽한 사랑';
  return g;
}

// ═══════════════════════════════════════════════════════════
// DAISY (데이지)
// ═══════════════════════════════════════════════════════════
function makeDaisy(color) {
  const g = new THREE.Group();
  g.add(stem(0.65, 0.024));

  const center = new THREE.Mesh(
    new THREE.SphereGeometry(0.085, 12, 8),
    new THREE.MeshLambertMaterial({ color: 0xFFD700 })
  );
  center.position.y = 0.69;
  g.add(center);

  const pMat = new THREE.MeshLambertMaterial({ color, side: THREE.DoubleSide });
  const pGeo = new THREE.ShapeGeometry(petalShape(0.038, 0.22), 5);

  for (let i = 0; i < 16; i++) {
    const a = (i / 16) * Math.PI * 2;
    const p = new THREE.Mesh(pGeo, pMat);
    p.position.set(Math.cos(a)*0.095, 0.69, Math.sin(a)*0.095);
    p.rotation.y = -a + Math.PI/2;
    p.rotation.x = -Math.PI/14;
    g.add(p);
  }

  g.userData.name = '데이지 (Daisy)';
  g.userData.desc = '순수함과 청초함의 꽃';
  return g;
}

// ═══════════════════════════════════════════════════════════
// LAVENDER (라벤더)
// ═══════════════════════════════════════════════════════════
function makeLavender() {
  const g = new THREE.Group();
  const sMat = new THREE.MeshLambertMaterial({ color: 0x5a8a3a });
  const fMat = new THREE.MeshLambertMaterial({ color: 0x9b59b6 });
  const f2Mat = new THREE.MeshLambertMaterial({ color: 0x7d3c98 });

  for (let s = 0; s < 6; s++) {
    const ox = (Math.random()-0.5)*0.18, oz = (Math.random()-0.5)*0.18;
    const h = 0.65 + Math.random()*0.35;
    const sg = new THREE.Group();
    sg.position.set(ox, 0, oz);

    const stm = new THREE.Mesh(new THREE.CylinderGeometry(0.007, 0.012, h, 5), sMat);
    stm.position.y = h/2;
    sg.add(stm);

    // spike
    for (let i = 0; i < 12; i++) {
      const t = i / 12;
      const bGeo = new THREE.SphereGeometry(0.018 - t*0.006, 6, 4);
      const bMesh = new THREE.Mesh(bGeo, i%2===0 ? fMat : f2Mat);
      const a = i * 2.4;
      bMesh.position.set(Math.cos(a)*0.022, h + 0.03 + t*0.22, Math.sin(a)*0.022);
      sg.add(bMesh);
    }

    g.add(sg);
  }

  // base leaves
  const lMat = new THREE.MeshLambertMaterial({ color: 0x6aab38, side: THREE.DoubleSide });
  for (let i = 0; i < 5; i++) {
    const a = (i/5)*Math.PI*2;
    const lGeo = new THREE.PlaneGeometry(0.15, 0.07);
    const lf = new THREE.Mesh(lGeo, lMat);
    lf.position.set(Math.cos(a)*0.09, 0.08, Math.sin(a)*0.09);
    lf.rotation.y = -a; lf.rotation.x = -0.25;
    g.add(lf);
  }

  g.userData.name = '라벤더 (Lavender)';
  g.userData.desc = '평화와 치유의 향기';
  return g;
}

// ═══════════════════════════════════════════════════════════
// CHERRY BLOSSOM TREE (벚꽃)
// ═══════════════════════════════════════════════════════════
function makeCherryTree() {
  const g = new THREE.Group();
  const wMat = new THREE.MeshLambertMaterial({ color: 0x6b3a2a });
  const pMat = new THREE.MeshLambertMaterial({ color: 0xffaec9, side: THREE.DoubleSide });
  const cMat = new THREE.MeshLambertMaterial({ color: 0xffe080 });

  // trunk
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.2, 3, 8), wMat);
  trunk.position.y = 1.5; trunk.castShadow = true;
  g.add(trunk);

  // branches + blossom clouds
  const branchAngles = [0, 1.26, 2.51, 3.77, 5.03];
  branchAngles.forEach(ba => {
    const bLen = 1.1 + Math.random()*0.5;
    const bDir = new THREE.Vector3(Math.cos(ba), 0.7, Math.sin(ba)).normalize();
    const bMid = new THREE.Vector3().addScaledVector(bDir, bLen*0.5).add(new THREE.Vector3(0, 3, 0));

    const bGeo = new THREE.CylinderGeometry(0.025, 0.055, bLen, 6);
    const branch = new THREE.Mesh(bGeo, wMat);
    branch.position.copy(bMid);
    branch.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), bDir);
    branch.castShadow = true;
    g.add(branch);

    // blossom cluster
    const tipPos = new THREE.Vector3().addScaledVector(bDir, bLen).add(new THREE.Vector3(0,3,0));
    for (let b = 0; b < 18; b++) {
      const blGrp = new THREE.Group();
      for (let p = 0; p < 5; p++) {
        const pa = (p/5)*Math.PI*2;
        const pGeo = new THREE.ShapeGeometry(petalShape(0.028, 0.09), 4);
        const pet = new THREE.Mesh(pGeo, pMat);
        pet.position.set(Math.cos(pa)*0.03, 0, Math.sin(pa)*0.03);
        pet.rotation.y = -pa+Math.PI/2; pet.rotation.x = -0.35;
        blGrp.add(pet);
      }
      const ctr = new THREE.Mesh(new THREE.SphereGeometry(0.012, 5, 4), cMat);
      blGrp.add(ctr);
      blGrp.position.set(
        tipPos.x + (Math.random()-0.5)*1.6,
        tipPos.y + (Math.random()-0.5)*0.9,
        tipPos.z + (Math.random()-0.5)*1.6
      );
      blGrp.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI*2, Math.random()*Math.PI);
      g.add(blGrp);
    }

    // sub branch
    const sBa = ba + 0.8;
    const sbLen = bLen * 0.6;
    const sbDir = new THREE.Vector3(Math.cos(sBa), 0.9, Math.sin(sBa)).normalize();
    const sbStart = bMid.clone().add(new THREE.Vector3().addScaledVector(bDir, bLen*0.3));
    const sbMid = sbStart.clone().addScaledVector(sbDir, sbLen*0.5);
    const sbGeo = new THREE.CylinderGeometry(0.015, 0.03, sbLen, 5);
    const sb = new THREE.Mesh(sbGeo, wMat);
    sb.position.copy(sbMid);
    sb.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), sbDir);
    g.add(sb);

    const sbTip = sbStart.clone().addScaledVector(sbDir, sbLen);
    for (let b = 0; b < 10; b++) {
      const blGrp = new THREE.Group();
      for (let p = 0; p < 5; p++) {
        const pa = (p/5)*Math.PI*2;
        const pGeo = new THREE.ShapeGeometry(petalShape(0.025, 0.08), 4);
        const pet = new THREE.Mesh(pGeo, pMat);
        pet.position.set(Math.cos(pa)*0.025, 0, Math.sin(pa)*0.025);
        pet.rotation.y = -pa+Math.PI/2; pet.rotation.x = -0.3;
        blGrp.add(pet);
      }
      blGrp.position.set(
        sbTip.x + (Math.random()-0.5)*1.2,
        sbTip.y + (Math.random()-0.5)*0.8,
        sbTip.z + (Math.random()-0.5)*1.2
      );
      blGrp.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI*2, Math.random()*Math.PI);
      g.add(blGrp);
    }
  });

  g.userData.name = '벚꽃 (Cherry Blossom)';
  g.userData.desc = '봄의 아름다움, 덧없음의 상징';
  return g;
}

// ═══════════════════════════════════════════════════════════
// COSMOS (코스모스)
// ═══════════════════════════════════════════════════════════
function makeCosmos(color) {
  const g = new THREE.Group();
  g.add(stem(1.0, 0.018));

  const lf = leaf(0.7);
  lf.position.set(0.06, 0.35, 0);
  lf.rotation.y = 0.5; lf.rotation.z = -0.4;
  g.add(lf);

  const center = new THREE.Mesh(
    new THREE.SphereGeometry(0.055, 10, 8),
    new THREE.MeshLambertMaterial({ color: 0xFFCC00 })
  );
  center.position.y = 1.04;
  g.add(center);

  const pMat = new THREE.MeshLambertMaterial({ color, side: THREE.DoubleSide });
  const pSh = new THREE.Shape();
  pSh.moveTo(0, 0);
  pSh.bezierCurveTo(0.04, 0.08, 0.045, 0.18, 0, 0.26);
  pSh.bezierCurveTo(-0.045, 0.18, -0.04, 0.08, 0, 0);
  const pGeo = new THREE.ShapeGeometry(pSh, 5);

  for (let i = 0; i < 8; i++) {
    const a = (i/8)*Math.PI*2 + 0.2;
    const p = new THREE.Mesh(pGeo, pMat);
    p.position.set(Math.cos(a)*0.065, 1.04, Math.sin(a)*0.065);
    p.rotation.y = -a+Math.PI/2; p.rotation.x = -Math.PI/12;
    g.add(p);
  }

  g.userData.name = '코스모스 (Cosmos)';
  g.userData.desc = '가을 바람에 흔들리는 소녀 같은 꽃';
  return g;
}

// ═══════════════════════════════════════════════════════════
// BUSH / HEDGE
// ═══════════════════════════════════════════════════════════
function makeBush(r = 0.8, col = 0x2d6e1b) {
  const g = new THREE.Group();
  const m = new THREE.MeshLambertMaterial({ color: col });
  for (let i = 0; i < 5; i++) {
    const sz = r * (0.45 + Math.random()*0.55);
    const b = new THREE.Mesh(new THREE.SphereGeometry(sz, 7, 5), m);
    b.position.set((Math.random()-0.5)*r, sz*0.65, (Math.random()-0.5)*r);
    b.castShadow = true;
    g.add(b);
  }
  return g;
}

// ═══════════════════════════════════════════════════════════
// PLACE EVERYTHING
// ═══════════════════════════════════════════════════════════
const rayTargets = [];
const rng = (a, b) => a + Math.random()*(b-a);

function place(makeFlower, positions) {
  positions.forEach(([x, z]) => {
    const f = makeFlower();
    f.position.set(x, 0, z);
    f.rotation.y = rng(0, Math.PI*2);
    const sc = rng(0.82, 1.18);
    f.scale.setScalar(sc);
    scene.add(f);
    f.traverse(o => {
      if (o.isMesh) {
        o.castShadow = true;
        o.userData.flowerGroup = f;
        if (f.userData.name) rayTargets.push(o);
      }
    });
  });
}

// Rose garden (east)
const roseColors = [0xff1a44, 0xff69b4, 0xdc143c, 0xff007f, 0xffc0cb, 0xd40055];
for (let i = 0; i < 22; i++) {
  const col = roseColors[i % roseColors.length];
  place(() => makeRose(col), [[rng(6,18), rng(-10,10)]]);
}

// Sunflower field (west)
for (let i = 0; i < 14; i++) {
  place(makeSunflower, [[rng(-18,-6), rng(-10,10)]]);
}

// Tulip valley (north)
const tulipColors = [0xff6600, 0x9b59b6, 0xff69b4, 0xffd700, 0xff3300, 0x00aaff];
for (let i = 0; i < 24; i++) {
  const col = tulipColors[i % tulipColors.length];
  place(() => makeTulip(col), [[rng(-11,11), rng(-20,-8)]]);
}

// Daisy meadow (south)
const daisyColors = [0xffffff, 0xfffde0, 0xffd700, 0xffb6c1, 0xe8ffe0];
for (let i = 0; i < 28; i++) {
  const col = daisyColors[i % daisyColors.length];
  place(() => makeDaisy(col), [[rng(-12,12), rng(8,22)]]);
}

// Lavender patches (scattered mid)
for (let i = 0; i < 18; i++) {
  const a = rng(0, Math.PI*2);
  const r2 = rng(5, 25);
  place(makeLavender, [[Math.cos(a)*r2, Math.sin(a)*r2]]);
}

// Cosmos (scattered)
const cosmosColors = [0xff69b4, 0xff9de2, 0xffffff, 0xd4a0ff, 0xff6eb4];
for (let i = 0; i < 20; i++) {
  const col = cosmosColors[i % cosmosColors.length];
  const a = rng(0, Math.PI*2); const r3 = rng(3, 28);
  place(() => makeCosmos(col), [[Math.cos(a)*r3, Math.sin(a)*r3]]);
}

// Cherry blossom trees
[[22,22],[22,-22],[-22,22],[-22,-22],[0,-28],[0,28],[28,0],[-28,0]].forEach(([x,z]) => {
  place(makeCherryTree, [[x, z]]);
});

// Hedges / bushes (perimeter + scattered)
for (let i = 0; i < 45; i++) {
  const a = (i/45)*Math.PI*2;
  const r4 = 35 + rng(-3,3);
  const b = makeBush(rng(0.8, 1.5));
  b.position.set(Math.cos(a)*r4, 0, Math.sin(a)*r4);
  scene.add(b);
}
for (let i = 0; i < 12; i++) {
  const b = makeBush(rng(0.5, 1.0), 0x1e5a10);
  b.position.set(rng(-30,30), 0, rng(-30,30));
  scene.add(b);
}

// ═══════════════════════════════════════════════════════════
// FLOATING PETALS (particle system)
// ═══════════════════════════════════════════════════════════
const N_PETALS = 250;
const pPos = new Float32Array(N_PETALS * 3);
const pVel = [];

for (let i = 0; i < N_PETALS; i++) {
  pPos[i*3]   = rng(-40, 40);
  pPos[i*3+1] = rng(0.3, 9);
  pPos[i*3+2] = rng(-40, 40);
  pVel.push({ x: rng(-0.018, 0.018), y: rng(-0.012, -0.006), z: rng(-0.018, 0.018) });
}

const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));

// Build a petal sprite on canvas
const pCanvas = document.createElement('canvas');
pCanvas.width = pCanvas.height = 64;
const pCtx = pCanvas.getContext('2d');
pCtx.fillStyle = 'rgba(0,0,0,0)';
pCtx.fillRect(0,0,64,64);
const grd = pCtx.createRadialGradient(32,32,4,32,32,28);
grd.addColorStop(0, 'rgba(255,200,220,0.9)');
grd.addColorStop(0.6, 'rgba(255,170,200,0.6)');
grd.addColorStop(1, 'rgba(255,150,190,0)');
pCtx.fillStyle = grd;
pCtx.ellipse(32,32,26,16,Math.PI/5,0,Math.PI*2);
pCtx.fill();
const pTex = new THREE.CanvasTexture(pCanvas);

const petalPoints = new THREE.Points(pGeo, new THREE.PointsMaterial({
  size: 0.35, map: pTex, transparent: true, opacity: 0.75,
  alphaTest: 0.05, depthWrite: false, color: 0xffcce0
}));
scene.add(petalPoints);

// ═══════════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════════
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

let yaw = 0, pitch = 0, isLocked = false;

const startScreen = document.getElementById('start-screen');
const uiEl        = document.getElementById('ui');
const flowerLabel = document.getElementById('flower-label');
const zoneName    = document.getElementById('zone-name');

startScreen.addEventListener('click', () => {
  renderer.domElement.requestPointerLock();
});

document.addEventListener('pointerlockchange', () => {
  isLocked = document.pointerLockElement === renderer.domElement;
  if (isLocked) {
    startScreen.classList.add('hidden');
    setTimeout(() => startScreen.style.display='none', 800);
    uiEl.style.display = 'block';
  } else {
    startScreen.style.display = 'flex';
    startScreen.classList.remove('hidden');
    uiEl.style.display = 'none';
  }
});

document.addEventListener('mousemove', e => {
  if (!isLocked) return;
  yaw   -= e.movementX * 0.0022;
  pitch -= e.movementY * 0.0022;
  pitch = Math.max(-Math.PI/2.8, Math.min(Math.PI/2.8, pitch));
});

// ─── Zone detection ─────────────────────────────────────────
const ZONES = [
  { name: '🌹 장미 정원',     x:  12, z:   0, r: 14 },
  { name: '🌻 해바라기 밭',   x: -12, z:   0, r: 14 },
  { name: '🌷 튤립 계곡',     x:   0, z: -14, r: 14 },
  { name: '🌼 데이지 초원',   x:   0, z:  15, r: 14 },
  { name: '💜 라벤더 길',     x:   0, z:   0, r:  6 },
  { name: '🌸 벚꽃 나무 길', x:  22, z:  22, r: 10 },
];
let lastZone = '';
let zoneTimer = null;

function detectZone() {
  const px = camera.position.x, pz = camera.position.z;
  let best = null, bestDist = Infinity;
  ZONES.forEach(z => {
    const d = Math.hypot(px - z.x, pz - z.z);
    if (d < z.r && d < bestDist) { bestDist = d; best = z; }
  });
  const name = best ? best.name : '🌸 봄의 정원';
  if (name !== lastZone) {
    lastZone = name;
    zoneName.textContent = name;
    zoneName.classList.remove('fade');
    clearTimeout(zoneTimer);
    zoneTimer = setTimeout(() => zoneName.classList.add('fade'), 3000);
  }
}

// ─── Raycasting ─────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const screenCenter = new THREE.Vector2(0, 0);
let lastHit = null;

function doRaycast() {
  raycaster.setFromCamera(screenCenter, camera);
  const hits = raycaster.intersectObjects(rayTargets, false);
  if (hits.length && hits[0].distance < 6) {
    const fg = hits[0].object.userData.flowerGroup;
    if (fg && fg.userData.name && fg !== lastHit) {
      lastHit = fg;
      flowerLabel.querySelector('.fname').textContent = fg.userData.name;
      flowerLabel.querySelector('.fdesc').textContent = fg.userData.desc;
      flowerLabel.classList.add('show');
    }
  } else if (lastHit) {
    lastHit = null;
    flowerLabel.classList.remove('show');
  }
}

// ═══════════════════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════════════════
const clock = new THREE.Clock();
let time = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  time += dt;

  if (isLocked) {
    // Movement
    const speed = (keys['ShiftLeft'] || keys['ShiftRight']) ? 9 : 4;
    const dir = new THREE.Vector3();
    if (keys['KeyW'] || keys['ArrowUp'])    dir.z -= 1;
    if (keys['KeyS'] || keys['ArrowDown'])  dir.z += 1;
    if (keys['KeyA'] || keys['ArrowLeft'])  dir.x -= 1;
    if (keys['KeyD'] || keys['ArrowRight']) dir.x += 1;
    dir.normalize();
    dir.applyEuler(new THREE.Euler(0, yaw, 0));
    dir.multiplyScalar(speed * dt);

    camera.position.x = Math.max(-44, Math.min(44, camera.position.x + dir.x));
    camera.position.z = Math.max(-44, Math.min(44, camera.position.z + dir.z));
    // Slight head-bob
    camera.position.y = 1.7 + Math.sin(time * 4.5) * (dir.length() > 0.001 ? 0.03 : 0);

    camera.rotation.order = 'YXZ';
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;

    detectZone();
    doRaycast();
  }

  // Animate petals
  const posArr = pGeo.attributes.position.array;
  for (let i = 0; i < N_PETALS; i++) {
    const v = pVel[i];
    posArr[i*3]   += v.x + Math.sin(time * 0.6 + i * 0.8) * 0.006;
    posArr[i*3+1] += v.y;
    posArr[i*3+2] += v.z + Math.cos(time * 0.5 + i * 0.7) * 0.006;
    if (posArr[i*3+1] < 0.1) {
      posArr[i*3]   = rng(-40, 40);
      posArr[i*3+1] = rng(6, 10);
      posArr[i*3+2] = rng(-40, 40);
    }
  }
  pGeo.attributes.position.needsUpdate = true;

  // Gently sway the sky time (sun color warmth)
  const warm = 0.5 + 0.5 * Math.sin(time * 0.05);
  sun.color.setRGB(1, 0.96 + warm * 0.04, 0.76 + warm * 0.08);

  renderer.render(scene, camera);
}

animate();
</script>
